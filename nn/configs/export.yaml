defaults:
  - _self_
  - dataset: manifest
  - features: mel
  - model: tinyconv
  - experiment: null

hydra:
  run:
    dir: runs/${now:%Y-%m-%d_%H-%M-%S}
  job:
    chdir: true

# Paths and output directory
checkpoint: null  # path to .ckpt or state_dict; if null, exports randomly initialized model
out_dir: export

onnx:
  opset: 13
  simplify: true

calib:
  split: train         # train|val
  num_windows: 512     # representative windows for PTQ
  save_npy: true       # save windows under ${out_dir}/calib/*.npy

espdl:
  enabled: true        # export ESP-DL (.espdl) via dockerized esp-ppq
  target: esp32s3      # 'c' | 'esp32s3' | 'esp32p4'
  num_bits: 8          # 8 or 16
  device: cpu          # 'cpu' or 'cuda'
  calib_steps: 64      # steps over representative dataset
  export_test_values: true
  verbose: 1
  error_report: true
