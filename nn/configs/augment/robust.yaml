# Robust augmentation targeted at the "loud = pump_on" bias and unseen-env
# generalization. Used with dm.use_cache=false so transforms actually fire.
#
# Rationale per transform:
#  - gain ±12 dB: the model must not latch onto absolute amplitude.
#  - colored noise 0-25 dB SNR: wide range so *loud* noisy negatives look similar
#    to loud pump positives in overall energy.
#  - pitch shift ±2 semitones: simulates pump wear/slightly different motor.
#  - high/low pass: random frequency shaping, small probability.
#  - NO bandpass 150-5500Hz: the old cap was narrower than inference band
#    and dropped real pump harmonics.
#  - time_masking (SpliceOut): SpecAugment-style temporal dropout.
#  - polarity_inversion: free invariance, shouldn't affect pump identity.
train:
  enabled: true
  shuffle: true
  same_on_batch: false
  transforms:
    - type: gain
      probability: 0.8
      params:
        min_gain_in_db: -12.0
        max_gain_in_db: 12.0
    - type: add_colored_noise
      probability: 0.7
      params:
        min_snr_in_db: 0.0
        max_snr_in_db: 25.0
        min_f_decay: -1.5
        max_f_decay: 1.5
    - type: pitch_shift
      probability: 0.3
      params:
        min_transpose_semitones: -2.0
        max_transpose_semitones: 2.0
    - type: highpass
      probability: 0.2
      params:
        min_cutoff_freq: 40.0
        max_cutoff_freq: 200.0
    - type: lowpass
      probability: 0.2
      params:
        min_cutoff_freq: 8000.0
        max_cutoff_freq: 14000.0
    - type: time_masking
      probability: 0.4
      params:
        num_time_intervals: 2
        max_width: 400
    - type: polarity_inversion
      probability: 0.5
      params: {}
val:
  enabled: false
  shuffle: false
  same_on_batch: false
  transforms: []
test:
  enabled: false
  shuffle: false
  same_on_batch: false
  transforms: []
