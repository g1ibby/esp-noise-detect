defaults:
  - dataset: manifest
  - features: mel
  - model: tinyconv
  - experiment: null
  - _self_

hydra:
  run:
    dir: runs/${now:%Y-%m-%d_%H-%M-%S}
  job:
    chdir: true

# IO
input_path: ""
output_csv: null
checkpoint: null
use_manifest: false
split: null  # one of: train, val, test
window_output_csv: null
emit_window_stats: false

# Execution
device: auto  # auto|cpu|mps|cuda
# If null and checkpoint provided, try reading checkpoints/threshold.json
threshold: null
aggregate: mean  # mean|max
batch_size: 32
