defaults:
  - dataset: manifest
  - features: mel
  - model: tinyconv
  - augment: none
  - experiment: null
  - _self_

hydra:
  run:
    dir: runs/${now:%Y-%m-%d_%H-%M-%S}
  job:
    chdir: true

dataset:
  sample_rate: 32000
  window_s: 1.0
  hop_s: 0.5
  class_names: [pump_off, pump_on]

model:
  channels: [16, 32, 64]
  dropout: 0.0

dm:
  batch_size: 128
  num_workers: 4
  pin_memory: true
  # Precompute log-mel spectrograms once into a cached tensor; subsequent epochs
  # skip waveform decode/resample/FFT. Disables waveform augmentations.
  use_cache: true
  cache_dir: null

optim:
  name: adamw
  lr: 1e-3
  weight_decay: 1e-2

sched:
  name: none
  t_max: 100
  min_lr: 1e-5

trainer:
  max_epochs: 20
  accelerator: auto
  devices: 1
  precision: "32"
  gradient_clip_val: 1.0
  deterministic: true
  seed: 42
