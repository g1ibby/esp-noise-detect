# @package _global_
# Baseline TinyConv with light augmentation and 1 s windows.
# NOTE: the @package directive above MUST be the very first line of this file
# (Hydra parses the file header before any YAML). Putting it after other
# comments causes the file to load under `experiment.*` instead of merging
# at the top level — this was a real bug in the prior version that made
# augmentation silently never run.

defaults:
  - override /augment: light
  - _self_

dm:
  use_cache: false

trainer:
  max_epochs: 20

dataset:
  window_s: 1.0
  hop_s: 0.5
